<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kosherbot ✡️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-container">
    <header>
      <div class="header-left">
        <h1>
          <span class="icon">✡️</span>
          kosherbot
        </h1>
      </div>
      <div class="header-right">
        <button id="lang-toggle" class="lang-btn">LANG 🇮🇱/🇺🇸</button>
      </div>
    </header>

    <div class="chat-area" id="chat-area">
      <div class="message bot">
        <p class="bilingual-greeting">
          <span class="he">שלום! שאלו כל שאלה על כשרות.</span>
          <span class="en">Shalom! Ask me anything about kashrut.</span>
        </p>
      </div>
    </div>

    <form id="chat-form" class="input-area">
      <input type="text" id="user-input" placeholder="Is salmon kosher?" autocomplete="off" required>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
